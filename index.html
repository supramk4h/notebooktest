<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synaptic — Knowledge Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ═══════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════ */
:root {
  --bg: #07080d;
  --bg2: #0d0f18;
  --bg3: #13162200;
  --surface: #111420;
  --surface2: #181c2e;
  --border: rgba(130,140,220,0.1);
  --border2: rgba(130,140,220,0.22);
  --text: #dde0f0;
  --text2: #8890b8;
  --text3: #4a5072;
  --accent: #7c5cfc;
  --accent-dim: rgba(124,92,252,0.18);
  --accent2: #22d3ee;
  --accent2-dim: rgba(34,211,238,0.15);
  --gold: #f8b445;
  --gold-dim: rgba(248,180,69,0.18);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.15);
  --green: #34d399;
  --node-bg: #11142000;
  --node-border: rgba(130,140,220,0.14);
  --node-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.4);
  --node-shadow-hover: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(130,140,220,0.25);
  --node-shadow-selected: 0 0 0 2px var(--accent), 0 8px 40px rgba(124,92,252,0.3);
  --conn-color: rgba(124,92,252,0.7);
  --conn-width: 1.8px;
  --radius: 14px;
  --toolbar-h: 52px;
  --status-h: 28px;
  --font-ui: 'Syne', system-ui, sans-serif;
  --font-content: 'Lora', Georgia, serif;
  --dot: radial-gradient(circle, rgba(255,255,255,0.045) 1px, transparent 1px);
  --dot-size: 28px;
  --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --bg: #f0f2fa;
  --bg2: #e8eaf6;
  --surface: #ffffff;
  --surface2: #f4f5fc;
  --border: rgba(80,90,160,0.12);
  --border2: rgba(80,90,160,0.28);
  --text: #1a1d35;
  --text2: #5c6490;
  --text3: #9098c0;
  --node-bg: #ffffffdd;
  --node-border: rgba(80,90,160,0.15);
  --node-shadow: 0 4px 24px rgba(0,0,20,0.1), 0 1px 3px rgba(0,0,20,0.07);
  --node-shadow-hover: 0 8px 40px rgba(0,0,20,0.15), 0 0 0 1px rgba(80,90,160,0.2);
  --dot: radial-gradient(circle, rgba(0,0,0,0.1) 1px, transparent 1px);
  --accent-dim: rgba(124,92,252,0.12);
}

/* ═══════════════════════════════════
   BASE & RESET
═══════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: var(--font-ui); color: var(--text); user-select: none; }
button { font-family: var(--font-ui); cursor: pointer; border: none; outline: none; background: none; }
input, textarea { font-family: var(--font-content); outline: none; border: none; background: none; color: var(--text); }
::selection { background: var(--accent-dim); color: var(--text); }

/* ═══════════════════════════════════
   APP LAYOUT
═══════════════════════════════════ */
#app { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; overflow: hidden; }

/* ═══════════════════════════════════
   TOOLBAR
═══════════════════════════════════ */
#toolbar {
  height: var(--toolbar-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; padding: 0 16px;
  position: relative; z-index: 200;
  backdrop-filter: blur(20px);
  flex-shrink: 0;
}
.tb-logo {
  font-size: 15px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-right: 8px; display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.tb-logo svg { width: 22px; height: 22px; flex-shrink: 0; }
.tb-sep { width: 1px; height: 22px; background: var(--border2); margin: 0 4px; }
.tb-group { display: flex; align-items: center; gap: 4px; }
.tb-group-center { flex: 1; justify-content: center; }
.tb-group-right { margin-left: auto; }

.tb-btn {
  height: 32px; padding: 0 12px; border-radius: 8px;
  font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
  color: var(--text2); transition: all var(--transition);
  display: flex; align-items: center; gap: 6px; white-space: nowrap;
}
.tb-btn:hover { background: var(--surface2); color: var(--text); }
.tb-btn.active { background: var(--accent-dim); color: var(--accent); }
.tb-btn.icon-btn { width: 32px; padding: 0; justify-content: center; font-size: 15px; }
.tb-btn.primary { background: var(--accent-dim); color: var(--accent); }
.tb-btn.primary:hover { background: var(--accent); color: white; }

#zoom-display {
  font-size: 12px; font-weight: 600; color: var(--text2);
  min-width: 44px; text-align: center; letter-spacing: 0.5px;
}
.sync-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  padding: 3px 8px; border-radius: 20px; transition: all var(--transition);
}
.sync-badge.local { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
.sync-badge.syncing { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(248,180,69,0.3); }
.sync-badge.synced { background: rgba(52,211,153,0.12); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
.sync-badge.error { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }

/* ═══════════════════════════════════
   CANVAS CONTAINER
═══════════════════════════════════ */
#canvas-container {
  flex: 1; position: relative; overflow: hidden; cursor: default;
  background: var(--bg);
  background-image: var(--dot);
  background-size: var(--dot-size) var(--dot-size);
}
#canvas-world {
  position: absolute; top: 0; left: 0;
  transform-origin: 0 0;
  will-change: transform;
}
#connections-svg {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  overflow: visible;
}

/* ═══════════════════════════════════
   NODES
═══════════════════════════════════ */
.node {
  position: absolute;
  width: 230px;
  min-height: 110px;
  background: var(--surface);
  border: 1px solid var(--node-border);
  border-radius: var(--radius);
  box-shadow: var(--node-shadow);
  transition: box-shadow var(--transition), border-color var(--transition), opacity var(--transition), transform 0.12s ease;
  cursor: grab;
  display: flex; flex-direction: column;
  z-index: 10;
  will-change: transform;
}
.node:hover { box-shadow: var(--node-shadow-hover); z-index: 20; }
.node.selected { box-shadow: var(--node-shadow-selected); border-color: var(--accent); z-index: 30; }
.node.faded { opacity: 0.25; }
.node.highlighted { opacity: 1; z-index: 25; }
.node.dragging { cursor: grabbing; z-index: 100; transform: scale(1.02); box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 2px var(--accent); }
.node.just-created { animation: nodeAppear 0.28s cubic-bezier(0.34,1.56,0.64,1); }

@keyframes nodeAppear {
  from { opacity:0; transform: scale(0.7); }
  to   { opacity:1; transform: scale(1); }
}

.node-header {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 10px 6px;
  position: relative;
}
.node-color-bar {
  width: 3px; height: 24px; border-radius: 3px;
  background: var(--accent); flex-shrink: 0;
  transition: background var(--transition);
}
.node-tag {
  font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
  color: var(--text3); text-transform: uppercase; flex: 1;
}
.node-actions {
  display: flex; gap: 2px; opacity: 0; transition: opacity var(--transition);
}
.node:hover .node-actions { opacity: 1; }
.node-action-btn {
  width: 20px; height: 20px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--text3); transition: all var(--transition);
}
.node-action-btn:hover { background: var(--surface2); color: var(--text); }
.node-action-btn.delete:hover { background: var(--red-dim); color: var(--red); }

.node-content {
  font-family: var(--font-content);
  font-size: 13.5px; line-height: 1.65;
  color: var(--text);
  padding: 2px 14px 14px;
  min-height: 60px;
  outline: none;
  resize: none;
  word-break: break-word;
  white-space: pre-wrap;
}
.node-content:empty::before {
  content: attr(data-placeholder);
  color: var(--text3);
  font-style: italic;
  pointer-events: none;
}
.node-content:focus { cursor: text; }

/* Connector Points */
.connectors { position: absolute; inset: 0; pointer-events: none; }
.connector {
  position: absolute; width: 12px; height: 12px; border-radius: 50%;
  background: var(--accent); border: 2px solid var(--bg2);
  opacity: 0; cursor: crosshair; transition: opacity 0.15s, transform 0.15s;
  pointer-events: all; z-index: 50;
  transform: scale(0.7);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.node:hover .connector, .connector.connecting-active { opacity: 1; transform: scale(1); }
.connector:hover { transform: scale(1.3) !important; background: var(--accent2); }
.connector-left   { left: -6px;  top: 50%; transform: translateY(-50%) scale(0.7); }
.connector-right  { right: -6px; top: 50%; transform: translateY(-50%) scale(0.7); }
.connector-top    { top: -6px;   left: 50%; transform: translateX(-50%) scale(0.7); }
.connector-bottom { bottom: -6px; left: 50%; transform: translateX(-50%) scale(0.7); }
.node:hover .connector-left   { transform: translateY(-50%) scale(1); }
.node:hover .connector-right  { transform: translateY(-50%) scale(1); }
.node:hover .connector-top    { transform: translateX(-50%) scale(1); }
.node:hover .connector-bottom { transform: translateX(-50%) scale(1); }
.connector-left:hover   { transform: translateY(-50%) scale(1.3) !important; }
.connector-right:hover  { transform: translateY(-50%) scale(1.3) !important; }
.connector-top:hover    { transform: translateX(-50%) scale(1.3) !important; }
.connector-bottom:hover { transform: translateX(-50%) scale(1.3) !important; }

/* Resize handle */
.node-resize {
  position: absolute; bottom: 3px; right: 3px;
  width: 14px; height: 14px; cursor: se-resize;
  opacity: 0; transition: opacity var(--transition);
  display: flex; align-items: center; justify-content: center;
}
.node:hover .node-resize { opacity: 1; }
.node-resize::before {
  content: ''; display: block;
  width: 8px; height: 8px;
  border-right: 2px solid var(--text3);
  border-bottom: 2px solid var(--text3);
  border-radius: 1px;
}

/* Node color themes */
.node[data-color="warm"]    { --node-border: rgba(248,180,69,0.2); }
.node[data-color="warm"] .node-color-bar { background: var(--gold); }
.node[data-color="cyan"]    { --node-border: rgba(34,211,238,0.2); }
.node[data-color="cyan"] .node-color-bar { background: var(--accent2); }
.node[data-color="green"]   { --node-border: rgba(52,211,153,0.2); }
.node[data-color="green"] .node-color-bar { background: var(--green); }
.node[data-color="rose"]    { --node-border: rgba(248,113,113,0.2); }
.node[data-color="rose"] .node-color-bar { background: var(--red); }
.node[data-color="warm"].selected   { box-shadow: 0 0 0 2px var(--gold), 0 8px 40px rgba(248,180,69,0.25); }
.node[data-color="cyan"].selected   { box-shadow: 0 0 0 2px var(--accent2), 0 8px 40px rgba(34,211,238,0.25); }
.node[data-color="green"].selected  { box-shadow: 0 0 0 2px var(--green), 0 8px 40px rgba(52,211,153,0.25); }
.node[data-color="rose"].selected   { box-shadow: 0 0 0 2px var(--red), 0 8px 40px rgba(248,113,113,0.25); }

/* ═══════════════════════════════════
   SVG CONNECTIONS
═══════════════════════════════════ */
.conn-hit {
  stroke: transparent; stroke-width: 14; fill: none;
  cursor: pointer; pointer-events: stroke;
}
.conn-visual {
  stroke: var(--conn-color); stroke-width: var(--conn-width);
  fill: none; transition: stroke 0.2s;
  stroke-linecap: round;
  pointer-events: none;
}
.conn-group.selected .conn-visual { stroke: var(--accent2); stroke-width: 2.5px; }
.conn-group.faded .conn-visual { stroke: rgba(124,92,252,0.15); }
.conn-label-bg { fill: var(--surface); }
.conn-label-text {
  font-family: var(--font-ui); font-size: 10px; font-weight: 600;
  fill: var(--text2); letter-spacing: 0.4px;
  pointer-events: none;
}
.conn-group.selected .conn-label-text { fill: var(--accent2); }
#temp-connection {
  stroke: var(--accent2); stroke-width: 2px; fill: none;
  stroke-dasharray: 8,4; pointer-events: none;
  filter: drop-shadow(0 0 6px rgba(34,211,238,0.5));
}

/* ═══════════════════════════════════
   SEARCH PANEL
═══════════════════════════════════ */
#search-panel {
  position: absolute; top: 64px; right: 16px; z-index: 300;
  width: 300px; background: var(--surface); border: 1px solid var(--border2);
  border-radius: 14px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  overflow: hidden; transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
  transform-origin: top right;
}
#search-panel.hidden { opacity: 0; transform: scale(0.9); pointer-events: none; }
.search-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.search-icon { color: var(--text3); font-size: 15px; }
#search-input {
  flex: 1; font-family: var(--font-ui); font-size: 13px;
  color: var(--text); background: none;
}
#search-input::placeholder { color: var(--text3); }
#search-results { max-height: 280px; overflow-y: auto; }
.search-result {
  padding: 10px 16px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background var(--transition);
  display: flex; align-items: flex-start; gap: 8px;
}
.search-result:hover { background: var(--surface2); }
.search-result:last-child { border-bottom: none; }
.sr-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-top: 4px; flex-shrink: 0; }
.sr-text { font-family: var(--font-content); font-size: 12px; color: var(--text2); line-height: 1.5; }
.sr-text mark { background: var(--accent-dim); color: var(--accent); border-radius: 2px; font-style: normal; }
.search-empty { padding: 24px 16px; text-align: center; font-size: 12px; color: var(--text3); }

/* ═══════════════════════════════════
   CONTEXT MENU
═══════════════════════════════════ */
#context-menu {
  position: fixed; z-index: 500; background: var(--surface);
  border: 1px solid var(--border2); border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5); padding: 6px;
  min-width: 170px; transition: all 0.15s;
}
#context-menu.hidden { opacity: 0; transform: scale(0.92); pointer-events: none; }
.cm-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: 8px; width: 100%;
  font-size: 13px; font-weight: 500; color: var(--text2);
  transition: all var(--transition); cursor: pointer;
}
.cm-item:hover { background: var(--surface2); color: var(--text); }
.cm-item.danger:hover { background: var(--red-dim); color: var(--red); }
.cm-sep { height: 1px; background: var(--border); margin: 4px 0; }
.cm-icon { width: 16px; text-align: center; font-size: 13px; }

/* ═══════════════════════════════════
   COLOR PICKER
═══════════════════════════════════ */
#color-picker {
  position: fixed; z-index: 501; background: var(--surface);
  border: 1px solid var(--border2); border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  padding: 10px; display: flex; gap: 6px;
  transition: all 0.15s;
}
#color-picker.hidden { opacity: 0; pointer-events: none; }
.cp-swatch {
  width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition);
  border: 2px solid transparent;
}
.cp-swatch:hover { transform: scale(1.2); }
.cp-swatch.active { border-color: white; box-shadow: 0 0 0 2px rgba(255,255,255,0.3); }

/* ═══════════════════════════════════
   LABEL EDITOR
═══════════════════════════════════ */
#label-editor {
  position: fixed; z-index: 502; background: var(--surface);
  border: 1px solid var(--border2); border-radius: 10px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  padding: 8px; display: flex; gap: 6px; align-items: center;
  transition: all 0.15s;
}
#label-editor.hidden { opacity: 0; pointer-events: none; }
#label-input {
  font-family: var(--font-ui); font-size: 12px; font-weight: 500;
  padding: 5px 10px; width: 160px; color: var(--text);
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 7px;
}
#label-save {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  padding: 5px 12px; border-radius: 7px;
  background: var(--accent-dim); color: var(--accent);
  transition: all var(--transition);
}
#label-save:hover { background: var(--accent); color: white; }

/* ═══════════════════════════════════
   GRAPH OVERLAY
═══════════════════════════════════ */
#graph-overlay {
  position: absolute; inset: 0; z-index: 400;
  background: rgba(7,8,13,0.92); backdrop-filter: blur(16px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: all 0.25s;
}
#graph-overlay.hidden { opacity: 0; pointer-events: none; }
.graph-header {
  position: absolute; top: 16px; left: 0; right: 0;
  display: flex; align-items: center; justify-content: center;
  gap: 12px;
}
.graph-title {
  font-size: 13px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text3);
}
#btn-close-graph {
  position: absolute; right: 20px;
  font-size: 18px; color: var(--text3); transition: color var(--transition);
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
}
#btn-close-graph:hover { color: var(--text); background: var(--surface2); }
#graph-canvas {
  border-radius: 20px;
  cursor: pointer;
}

/* ═══════════════════════════════════
   STATUS BAR
═══════════════════════════════════ */
#status-bar {
  height: var(--status-h); background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px; flex-shrink: 0;
  font-size: 11px; color: var(--text3); letter-spacing: 0.3px;
}
.status-right { margin-left: auto; display: flex; gap: 16px; }
.kbd {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 4px; padding: 1px 5px; font-size: 10px;
  font-weight: 600; color: var(--text3);
}

/* ═══════════════════════════════════
   TOOLTIPS
═══════════════════════════════════ */
[title]:hover::after {
  content: attr(title);
  position: fixed; bottom: 36px; left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-ui); font-size: 11px; font-weight: 500;
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text2); padding: 4px 8px; border-radius: 6px;
  pointer-events: none; z-index: 999; white-space: nowrap;
}

/* ═══════════════════════════════════
   SCROLLBAR
═══════════════════════════════════ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ═══════════════════════════════════
   UTILITY
═══════════════════════════════════ */
.hidden { display: none !important; }
.sr-only { position: absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }

/* ═══════════════════════════════════
   CONNECT MODE CURSOR
═══════════════════════════════════ */
body.connect-mode #canvas-container { cursor: crosshair; }
body.connect-mode .node { cursor: crosshair; }

/* ═══════════════════════════════════
   EMPTY STATE
═══════════════════════════════════ */
#empty-hint {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center; pointer-events: none;
  transition: opacity 0.5s;
}
#empty-hint.hidden { opacity: 0; }
.eh-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
.eh-title { font-size: 15px; font-weight: 600; color: var(--text3); margin-bottom: 6px; }
.eh-sub { font-size: 12px; color: var(--text3); opacity: 0.6; }

/* ═══════════════════════════════════
   MINIMAP
═══════════════════════════════════ */
#minimap {
  position: absolute; bottom: 40px; right: 16px; z-index: 150;
  width: 160px; height: 110px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 12px; overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  cursor: pointer;
  transition: opacity var(--transition), transform var(--transition);
}
#minimap:hover { opacity: 1; }
#minimap-canvas { width: 100%; height: 100%; display: block; }
#minimap-viewport {
  position: absolute; border: 1.5px solid var(--accent);
  background: rgba(124,92,252,0.08); pointer-events: none;

<script>
'use strict';
/* ═══════════════════════════════════════════════════════
   SYNAPTIC KNOWLEDGE BOARD
   ─ Canvas Engine
   ─ Node System
   ─ Connection System
   ─ Graph View (Force-Directed)
   ─ Search
   ─ Supabase API (with local fallback)
   ─ Minimap
═══════════════════════════════════════════════════════ */

// ════════════════════════════════════
// 0. Polyfill for roundRect (used in minimap)
// ════════════════════════════════════
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    return this;
  };
}

// ════════════════════════════════════
// 1. CONFIG — Replace with your Supabase credentials
// ════════════════════════════════════
const CONFIG = {
  SUPABASE_URL: 'https://wfrldnqmgwytaykkpuxb.supabase.co',
  SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmcmxkbnFtZ3d5dGF5a2twdXhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MjI5MjIsImV4cCI6MjA4ODQ5ODkyMn0.eSWwmAqUygnM9mvdqDcjOCrz2HdVthqQRSTlXDYIJ5o',
  SAVE_DEBOUNCE_MS: 900,
  MIN_ZOOM: 0.08,
  MAX_ZOOM: 4.0,
  ZOOM_SENSITIVITY: 0.0012,
  NODE_DEFAULT_WIDTH: 230,
  NODE_DEFAULT_COLOR: 'default',
};

// ════════════════════════════════════
// 2. STATE
// ════════════════════════════════════
const state = {
  nodes: new Map(),       // id → { id, content, x, y, width, color, el }
  connections: new Map(), // id → { id, source_id, target_id, label, el(g) }
  camera: { x: 0, y: 0, zoom: 1 },
  selectedNodeId: null,
  selectedConnId: null,
  draggingNode: null,     // { id, startX, startY, offsetX, offsetY }
  connectingFrom: null,   // { nodeId, side, startX, startY } screen coords
  panningCanvas: false,
  panStart: { x: 0, y: 0 },
  spaceHeld: false,
  connectMode: false,
  theme: 'dark',
  contextTarget: null,    // node id for context menu
  colorTarget: null,      // node id for color picker
  labelTarget: null,      // conn id for label editor
  graphNodes: [],         // force simulation positions
  graphAnimating: false,
  isSupabase: false,
};

let supabaseClient = null;

// ════════════════════════════════════
// 3. DOM REFERENCES
// ════════════════════════════════════
const $ = id => document.getElementById(id);
const DOM = {
  app: $('app'),
  toolbar: $('toolbar'),
  canvasContainer: $('canvas-container'),
  canvasWorld: $('canvas-world'),
  connSVG: $('connections-svg'),
  tempConn: $('temp-connection'),
  emptyHint: $('empty-hint'),
  searchPanel: $('search-panel'),
  searchInput: $('search-input'),
  searchResults: $('search-results'),
  contextMenu: $('context-menu'),
  colorPicker: $('color-picker'),
  labelEditor: $('label-editor'),
  labelInput: $('label-input'),
  labelSave: $('label-save'),
  graphOverlay: $('graph-overlay'),
  graphCanvas: $('graph-canvas'),
  syncBadge: $('sync-status'),
  zoomDisplay: $('zoom-display'),
  statusNodes: $('status-nodes'),
  statusConns: $('status-connections'),
  statusZoom: $('status-zoom'),
  minimapCanvas: $('minimap-canvas'),
  minimapViewport: $('minimap-viewport'),
  minimap: $('minimap'),
};

// ════════════════════════════════════
// 4. UTILITIES
// ════════════════════════════════════
function uid() {
  return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function debounce(fn, delay) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// Screen ↔ World coordinate conversion
function screenToWorld(sx, sy) {
  const rect = DOM.canvasContainer.getBoundingClientRect();
  return {
    x: (sx - rect.left - state.camera.x) / state.camera.zoom,
    y: (sy - rect.top  - state.camera.y) / state.camera.zoom,
  };
}

function worldToScreen(wx, wy) {
  const rect = DOM.canvasContainer.getBoundingClientRect();
  return {
    x: wx * state.camera.zoom + state.camera.x + rect.left,
    y: wy * state.camera.zoom + state.camera.y + rect.top,
  };
}

// Get node edge points for connection anchoring
function getNodeEdgePoint(node, targetX, targetY) {
  const cx = node.x + node.width / 2;
  const cy = node.y + node.height / 2;
  const hw = node.width / 2;
  const hh = node.height / 2;
  const dx = targetX - cx;
  const dy = targetY - cy;
  if (Math.abs(dx) < 0.01 && Math.abs(dy) < 0.01) return { x: cx, y: cy };
  const scaleX = dx !== 0 ? hw / Math.abs(dx) : Infinity;
  const scaleY = dy !== 0 ? hh / Math.abs(dy) : Infinity;
  const scale = Math.min(scaleX, scaleY);
  return { x: cx + dx * scale, y: cy + dy * scale };
}

// Cubic bezier SVG path between two points
function cubicPath(x1, y1, x2, y2) {
  const dx = Math.abs(x2 - x1);
  const cp = clamp(dx * 0.5, 60, 200);
  return `M ${x1.toFixed(1)} ${y1.toFixed(1)} C ${(x1+cp).toFixed(1)} ${y1.toFixed(1)}, ${(x2-cp).toFixed(1)} ${y2.toFixed(1)}, ${x2.toFixed(1)} ${y2.toFixed(1)}`;
}

// ════════════════════════════════════
// 5. CANVAS ENGINE — Pan & Zoom
// ════════════════════════════════════
function applyTransform() {
  const { x, y, zoom } = state.camera;
  DOM.canvasWorld.style.transform = `translate(${x}px,${y}px) scale(${zoom})`;
  DOM.zoomDisplay.textContent = Math.round(zoom * 100) + '%';
  DOM.statusZoom.textContent   = Math.round(zoom * 100) + '%';
  renderConnections();
  updateMinimap();
}

function zoomAt(screenX, screenY, factor) {
  const rect = DOM.canvasContainer.getBoundingClientRect();
  const mx = screenX - rect.left;
  const my = screenY - rect.top;
  const wx = (mx - state.camera.x) / state.camera.zoom;
  const wy = (my - state.camera.y) / state.camera.zoom;
  state.camera.zoom = clamp(state.camera.zoom * factor, CONFIG.MIN_ZOOM, CONFIG.MAX_ZOOM);
  state.camera.x = mx - wx * state.camera.zoom;
  state.camera.y = my - wy * state.camera.zoom;
  applyTransform();
}

function fitView(padding = 80) {
  if (state.nodes.size === 0) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  state.nodes.forEach(n => {
    minX = Math.min(minX, n.x);
    minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + n.width);
    maxY = Math.max(maxY, n.y + (n.height || 120));
  });
  const rect = DOM.canvasContainer.getBoundingClientRect();
  const scaleX = (rect.width  - padding*2) / (maxX - minX || 1);
  const scaleY = (rect.height - padding*2) / (maxY - minY || 1);
  state.camera.zoom = clamp(Math.min(scaleX, scaleY), CONFIG.MIN_ZOOM, CONFIG.MAX_ZOOM);
  state.camera.x = rect.width  / 2 - (minX + (maxX-minX)/2) * state.camera.zoom;
  state.camera.y = rect.height / 2 - (minY + (maxY-minY)/2) * state.camera.zoom;
  applyTransform();
}

function panToNode(nodeId, zoom = null) {
  const node = state.nodes.get(nodeId);
  if (!node) return;
  const rect = DOM.canvasContainer.getBoundingClientRect();
  if (zoom !== null) state.camera.zoom = clamp(zoom, CONFIG.MIN_ZOOM, CONFIG.MAX_ZOOM);
  const cx = node.x + node.width / 2;
  const cy = node.y + (node.height || 120) / 2;
  state.camera.x = rect.width  / 2 - cx * state.camera.zoom;
  state.camera.y = rect.height / 2 - cy * state.camera.zoom;
  applyTransform();
  // Flash selected
  selectNode(nodeId);
}

// ════════════════════════════════════
// 6. NODE SYSTEM
// ════════════════════════════════════
const saveNodeDebounced = debounce(saveNode, CONFIG.SAVE_DEBOUNCE_MS);

function createNode(worldX, worldY, content = '', color = CONFIG.NODE_DEFAULT_COLOR, id = null, existingWidth = null) {
  const nodeId = id || uid();
  const nodeData = {
    id: nodeId,
    content: content,
    x: worldX,
    y: worldY,
    width: existingWidth || CONFIG.NODE_DEFAULT_WIDTH,
    height: 120,
    color: color,
    el: null,
    created_at: Date.now(),
  };
  state.nodes.set(nodeId, nodeData);
  renderNodeDOM(nodeData, !id); // animate only if new
  updateStatus();
  updateEmptyHint();
  if (!id) {
    saveNode(nodeData);
    // Auto-focus content
    setTimeout(() => {
      const el = nodeData.el;
      if (el) {
        const content = el.querySelector('.node-content');
        content.focus();
        // Select all if has content
        const range = document.createRange();
        range.selectNodeContents(content);
        range.collapse(false);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
    }, 50);
  }
  return nodeData;
}

function renderNodeDOM(node, animate = false) {
  // Remove existing el if any
  if (node.el) node.el.remove();

  const el = document.createElement('div');
  el.className = 'node' + (animate ? ' just-created' : '');
  el.dataset.id = node.id;
  el.dataset.color = node.color;
  el.style.cssText = `left:${node.x}px;top:${node.y}px;width:${node.width}px;`;

  el.innerHTML = `
    <div class="node-header">
      <div class="node-color-bar"></div>
      <div class="node-tag">NOTE</div>
      <div class="node-actions">
        <button class="node-action-btn" data-action="color" title="Color">◈</button>
        <button class="node-action-btn delete" data-action="delete" title="Delete">✕</button>
      </div>
    </div>
    <div class="node-content" contenteditable="true" spellcheck="true" data-placeholder="Type your idea…">${escapeHtml(node.content)}</div>
    <div class="connectors">
      <div class="connector connector-left"  data-side="left"  data-node="${node.id}"></div>
      <div class="connector connector-right" data-side="right" data-node="${node.id}"></div>
      <div class="connector connector-top"   data-side="top"   data-node="${node.id}"></div>
      <div class="connector connector-bottom" data-side="bottom" data-node="${node.id}"></div>
    </div>
    <div class="node-resize" data-node="${node.id}"></div>
  `;

  node.el = el;
  DOM.canvasWorld.appendChild(el);

  // Measure height after layout
  requestAnimationFrame(() => {
    node.height = el.offsetHeight;
    renderConnections();
    updateMinimap();
  });

  // ── Node interactions ──
  initNodeInteractions(el, node);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function initNodeInteractions(el, node) {
  const content = el.querySelector('.node-content');
  const nodeId = node.id;

  // ── Content editing ──
  content.addEventListener('input', () => {
    node.content = content.innerText;
    requestAnimationFrame(() => {
      node.height = el.offsetHeight;
      renderConnections();
      updateMinimap();
    });
    saveNodeDebounced(node);
  });

  content.addEventListener('focus', () => {
    selectNode(nodeId, false);
  });

  content.addEventListener('mousedown', e => e.stopPropagation());
  content.addEventListener('keydown', e => e.stopPropagation());

  // ── Header action buttons ──
  el.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('mousedown', e => e.stopPropagation());
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const action = btn.dataset.action;
      if (action === 'delete') deleteNode(nodeId);
      else if (action === 'color') showColorPicker(nodeId, e.clientX, e.clientY);
    });
  });

  // ── Node drag ──
  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (e.target.classList.contains('connector')) return;
    if (e.target.classList.contains('node-resize')) return;
    if (e.target.classList.contains('node-content')) return;
    if (e.target.classList.contains('node-action-btn')) return;
    e.preventDefault();
    e.stopPropagation();
    selectNode(nodeId);
    const wPos = screenToWorld(e.clientX, e.clientY);
    state.draggingNode = {
      id: nodeId,
      offsetX: wPos.x - node.x,
      offsetY: wPos.y - node.y,
    };
    el.classList.add('dragging');
  });

  // ── Right-click context menu ──
  el.addEventListener('contextmenu', e => {
    e.preventDefault();
    e.stopPropagation();
    selectNode(nodeId);
    showContextMenu(nodeId, e.clientX, e.clientY);
  });

  // ── Click to select ──
  el.addEventListener('click', e => {
    if (e.target.classList.contains('node-content')) return;
    e.stopPropagation();
    selectNode(nodeId);
  });

  // ── Connector points drag (create connection) ──
  el.querySelectorAll('.connector').forEach(conn => {
    conn.addEventListener('mousedown', e => {
      e.preventDefault();
      e.stopPropagation();
      const side = conn.dataset.side;
      const sPos = worldToScreen(
        node.x + (side === 'right' ? node.width : side === 'left' ? 0 : node.width / 2),
        node.y + (side === 'bottom' ? node.height : side === 'top' ? 0 : (node.height || 120) / 2)
      );
      state.connectingFrom = { nodeId, side, startX: sPos.x, startY: sPos.y };
      DOM.tempConn.style.display = 'block';
      document.body.classList.add('connect-mode');
    });
  });

  // ── Resize handle ──
  const resizeHandle = el.querySelector('.node-resize');
  resizeHandle.addEventListener('mousedown', e => {
    e.preventDefault();
    e.stopPropagation();
    const startX = e.clientX;
    const startW = node.width;
    const onMove = mv => {
      const dw = (mv.clientX - startX) / state.camera.zoom;
      node.width = Math.max(180, startW + dw);
      el.style.width = node.width + 'px';
      requestAnimationFrame(() => {
        node.height = el.offsetHeight;
        renderConnections();
        updateMinimap();
      });
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      saveNodeDebounced(node);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function selectNode(nodeId, highlightConnected = true) {
  // Deselect previous
  if (state.selectedNodeId && state.selectedNodeId !== nodeId) {
    const prev = state.nodes.get(state.selectedNodeId);
    if (prev?.el) prev.el.classList.remove('selected', 'highlighted');
  }
  deselectConnection();
  state.selectedNodeId = nodeId;

  // Bring to front & mark selected
  state.nodes.forEach((n, id) => {
    if (!n.el) return;
    if (id === nodeId) {
      n.el.classList.add('selected', 'highlighted');
      n.el.classList.remove('faded');
      n.el.style.zIndex = 30;
    } else if (highlightConnected) {
      n.el.classList.remove('selected', 'highlighted');
    }
  });

  if (!highlightConnected) return;

  // Find connected node IDs
  const connectedIds = new Set([nodeId]);
  state.connections.forEach(conn => {
    if (conn.source_id === nodeId || conn.target_id === nodeId) {
      connectedIds.add(conn.source_id);
      connectedIds.add(conn.target_id);
    }
  });

  // Fade/highlight nodes and connections
  state.nodes.forEach((n, id) => {
    if (!n.el) return;
    if (connectedIds.has(id)) {
      n.el.classList.remove('faded');
      if (id !== nodeId) n.el.classList.add('highlighted');
    } else {
      n.el.classList.add('faded');
      n.el.classList.remove('highlighted');
    }
  });

  state.connections.forEach(conn => {
    if (!conn.el) return;
    const isConn = conn.source_id === nodeId || conn.target_id === nodeId;
    conn.el.classList.toggle('faded', !isConn);
    conn.el.classList.toggle('selected', false);
  });

  renderConnections();
}

function deselectAll() {
  state.selectedNodeId = null;
  state.nodes.forEach(n => {
    if (n.el) n.el.classList.remove('selected', 'faded', 'highlighted');
  });
  deselectConnection();
  renderConnections();
}

function deleteNode(nodeId) {
  const node = state.nodes.get(nodeId);
  if (!node) return;
  // Remove connected connections
  const toDelete = [];
  state.connections.forEach((conn, cid) => {
    if (conn.source_id === nodeId || conn.target_id === nodeId) toDelete.push(cid);
  });
  toDelete.forEach(cid => deleteConnection(cid));
  // Remove DOM
  if (node.el) node.el.remove();
  state.nodes.delete(nodeId);
  if (state.selectedNodeId === nodeId) state.selectedNodeId = null;
  updateStatus();
  updateEmptyHint();
  updateMinimap();
  dbDeleteNode(nodeId);
}

function duplicateNode(nodeId) {
  const src = state.nodes.get(nodeId);
  if (!src) return;
  createNode(src.x + 30, src.y + 30, src.content, src.color);
}

// ════════════════════════════════════
// 7. CONNECTION SYSTEM
// ════════════════════════════════════
const saveConnDebounced = debounce(saveConnection, CONFIG.SAVE_DEBOUNCE_MS);

function createConnection(sourceId, targetId, label = '', id = null) {
  if (sourceId === targetId) return null;
  // Prevent duplicate
  for (const conn of state.connections.values()) {
    if (conn.source_id === sourceId && conn.target_id === targetId) return null;
  }
  const connId = id || uid();
  const conn = { id: connId, source_id: sourceId, target_id: targetId, label, el: null };
  state.connections.set(connId, conn);
  renderConnectionDOM(conn);
  updateStatus();
  if (!id) saveConnection(conn);
  return conn;
}

function renderConnectionDOM(conn) {
  if (conn.el) conn.el.remove();
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.classList.add('conn-group');
  g.dataset.id = conn.id;

  const hitPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  hitPath.classList.add('conn-hit');

  const visPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  visPath.classList.add('conn-visual');
  visPath.setAttribute('marker-end', 'url(#arrow-default)');

  // Label
  const labelG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  labelG.classList.add('conn-label-g');
  const labelBg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  labelBg.classList.add('conn-label-bg');
  labelBg.setAttribute('rx', '4');
  const labelTxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  labelTxt.classList.add('conn-label-text');
  labelTxt.setAttribute('text-anchor', 'middle');
  labelG.appendChild(labelBg);
  labelG.appendChild(labelTxt);

  g.appendChild(hitPath);
  g.appendChild(visPath);
  g.appendChild(labelG);
  DOM.connSVG.appendChild(g);
  conn.el = g;

  // Update label text
  if (conn.label) {
    labelTxt.textContent = conn.label;
    labelG.style.display = '';
  } else {
    labelG.style.display = 'none';
  }

  // Click to select connection
  hitPath.addEventListener('click', e => {
    e.stopPropagation();
    selectConnection(conn.id);
  });

  // Double-click to edit label
  hitPath.addEventListener('dblclick', e => {
    e.stopPropagation();
    showLabelEditor(conn.id, e.clientX, e.clientY);
  });

  updateConnectionPath(conn);
}

function updateConnectionPath(conn) {
  if (!conn.el) return;
  const src = state.nodes.get(conn.source_id);
  const tgt = state.nodes.get(conn.target_id);
  if (!src || !tgt) return;

  const srcCx = src.x + src.width / 2;
  const srcCy = src.y + (src.height || 120) / 2;
  const tgtCx = tgt.x + tgt.width / 2;
  const tgtCy = tgt.y + (tgt.height || 120) / 2;

  // Get edge points
  const sp = getNodeEdgePoint(src, tgtCx, tgtCy);
  const tp = getNodeEdgePoint(tgt, srcCx, srcCy);

  // Convert world → screen
  const sps = worldToScreen(sp.x, sp.y);
  const tps = worldToScreen(tp.x, tp.y);

  // Arrow offset (so arrow tip touches edge, not inside node)
  const dx = tps.x - sps.x, dy = tps.y - sps.y;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  const arrowOffset = 8 * state.camera.zoom;
  const ex = tps.x - (dx/dist) * arrowOffset;
  const ey = tps.y - (dy/dist) * arrowOffset;

  const pathD = cubicPath(sps.x, sps.y, ex, ey);

  const hitPath = conn.el.querySelector('.conn-hit');
  const visPath = conn.el.querySelector('.conn-visual');
  hitPath.setAttribute('d', pathD);
  visPath.setAttribute('d', pathD);

  // Update marker
  const isSel = conn.el.classList.contains('selected');
  const isFaded = conn.el.classList.contains('faded');
  visPath.setAttribute('marker-end', isSel ? 'url(#arrow-selected)' : isFaded ? 'url(#arrow-faded)' : 'url(#arrow-default)');

  // Label midpoint
  const labelG = conn.el.querySelector('.conn-label-g');
  const labelTxt = conn.el.querySelector('.conn-label-text');
  if (conn.label) {
    labelG.style.display = '';
    labelTxt.textContent = conn.label;
    const mx = (sps.x + ex) / 2;
    const my = (sps.y + ey) / 2 - 8;
    labelTxt.setAttribute('x', mx);
    labelTxt.setAttribute('y', my);
    const bbox = labelTxt.getBBox ? labelTxt.getBBox() : { x: mx-20, y: my-12, width: 40, height: 14 };
    const pad = 4;
    const bg = conn.el.querySelector('.conn-label-bg');
    bg.setAttribute('x',  bbox.x - pad);
    bg.setAttribute('y',  bbox.y - pad);
    bg.setAttribute('width',  bbox.width + pad*2);
    bg.setAttribute('height', bbox.height + pad*2);
  } else {
    labelG.style.display = 'none';
  }
}

function renderConnections() {
  state.connections.forEach(conn => updateConnectionPath(conn));
}

function selectConnection(connId) {
  deselectAll();
  state.selectedConnId = connId;
  const conn = state.connections.get(connId);
  if (conn?.el) {
    conn.el.classList.add('selected');
    const vp = conn.el.querySelector('.conn-visual');
    if (vp) vp.setAttribute('marker-end', 'url(#arrow-selected)');
  }
}

function deselectConnection() {
  if (state.selectedConnId) {
    const conn = state.connections.get(state.selectedConnId);
    if (conn?.el) {
      conn.el.classList.remove('selected');
      const vp = conn.el.querySelector('.conn-visual');
      if (vp) vp.setAttribute('marker-end', 'url(#arrow-default)');
    }
  }
  state.selectedConnId = null;
}

function deleteConnection(connId) {
  const conn = state.connections.get(connId);
  if (conn?.el) conn.el.remove();
  state.connections.delete(connId);
  updateStatus();
  dbDeleteConnection(connId);
}

// ════════════════════════════════════
// 8. MOUSE & KEYBOARD HANDLERS
// ════════════════════════════════════
function initCanvasInteractions() {
  const container = DOM.canvasContainer;

  // ── Double-click: create node ──
  container.addEventListener('dblclick', e => {
    if (e.target !== container && e.target !== DOM.canvasWorld) return;
    const wPos = screenToWorld(e.clientX, e.clientY);
    createNode(wPos.x - CONFIG.NODE_DEFAULT_WIDTH / 2, wPos.y - 60);
  });

  // ── Mouse down: pan or drag node ──
  container.addEventListener('mousedown', e => {
    if (e.button === 1 || (e.button === 0 && state.spaceHeld)) {
      // Middle-click or space: pan
      e.preventDefault();
      state.panningCanvas = true;
      state.panStart = { x: e.clientX - state.camera.x, y: e.clientY - state.camera.y };
      container.style.cursor = 'grabbing';
      return;
    }
    if (e.button === 0 && (e.target === container || e.target === DOM.canvasWorld)) {
      // Left click on background: deselect
      deselectAll();
      hideAllPopups();
      // Start pan if not connecting
      if (!state.connectingFrom) {
        state.panningCanvas = true;
        state.panStart = { x: e.clientX - state.camera.x, y: e.clientY - state.camera.y };
        container.style.cursor = 'grabbing';
      }
    }
  });

  // ── Mouse move ──
  document.addEventListener('mousemove', e => {
    // Pan canvas
    if (state.panningCanvas) {
      state.camera.x = e.clientX - state.panStart.x;
      state.camera.y = e.clientY - state.panStart.y;
      applyTransform();
      return;
    }

    // Drag node
    if (state.draggingNode) {
      const wPos = screenToWorld(e.clientX, e.clientY);
      const node = state.nodes.get(state.draggingNode.id);
      if (node) {
        node.x = wPos.x - state.draggingNode.offsetX;
        node.y = wPos.y - state.draggingNode.offsetY;
        node.el.style.left = node.x + 'px';
        node.el.style.top  = node.y + 'px';
        renderConnections();
        updateMinimap();
        saveNodeDebounced(node);
      }
      return;
    }

    // Draw temp connection
    if (state.connectingFrom) {
      DOM.tempConn.style.display = 'block';
      const { startX, startY } = state.connectingFrom;
      const pathD = cubicPath(startX, startY, e.clientX, e.clientY);
      DOM.tempConn.setAttribute('d', pathD);
    }
  });

  // ── Mouse up ──
  document.addEventListener('mouseup', e => {
    if (state.panningCanvas) {
      state.panningCanvas = false;
      container.style.cursor = '';
    }

    if (state.draggingNode) {
      const node = state.nodes.get(state.draggingNode.id);
      if (node?.el) node.el.classList.remove('dragging');
      state.draggingNode = null;
    }

    if (state.connectingFrom) {
      // Check if released over a node
      const els = document.elementsFromPoint(e.clientX, e.clientY);
      let targetNodeEl = null;
      for (const el of els) {
        const nodeEl = el.closest('.node');
        if (nodeEl && nodeEl.dataset.id !== state.connectingFrom.nodeId) {
          targetNodeEl = nodeEl;
          break;
        }
      }
      if (targetNodeEl) {
        createConnection(state.connectingFrom.nodeId, targetNodeEl.dataset.id);
      }
      state.connectingFrom = null;
      DOM.tempConn.setAttribute('d', '');
      DOM.tempConn.style.display = 'none';
      if (!state.connectMode) document.body.classList.remove('connect-mode');
    }
  });

  // ── Wheel: zoom ──
  container.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1 + CONFIG.ZOOM_SENSITIVITY * -e.deltaY : 1 / (1 + CONFIG.ZOOM_SENSITIVITY * e.deltaY);
    zoomAt(e.clientX, e.clientY, factor);
  }, { passive: false });

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', e => {
    if (e.target.classList.contains('node-content') || e.target.tagName === 'INPUT') return;
    const key = e.key.toLowerCase();

    if (key === ' ') { e.preventDefault(); state.spaceHeld = true; container.style.cursor = 'grab'; }
    if (key === 'escape') { deselectAll(); hideAllPopups(); state.connectMode = false; updateConnectModeUI(); }
    if (key === 'f') fitView();
    if (key === 'g') toggleGraphView();
    if (key === 't') toggleTheme();
    if (key === '/' || (e.key === 'f' && (e.ctrlKey || e.metaKey))) { e.preventDefault(); toggleSearch(); }
    if (key === 'c') { e.preventDefault(); toggleConnectMode(); }
    if (key === '=' || key === '+') zoomAt(window.innerWidth/2, window.innerHeight/2, 1.15);
    if (key === '-') zoomAt(window.innerWidth/2, window.innerHeight/2, 0.87);
    if (key === '0') { state.camera.zoom = 1; state.camera.x = 0; state.camera.y = 0; applyTransform(); }

    // Delete selected
    if ((key === 'delete' || key === 'backspace') && !e.target.isContentEditable) {
      if (state.selectedNodeId) deleteNode(state.selectedNodeId);
      else if (state.selectedConnId) deleteConnection(state.selectedConnId);
    }
  });

  document.addEventListener('keyup', e => {
    if (e.key === ' ') { state.spaceHeld = false; container.style.cursor = ''; }
  });
}

// ════════════════════════════════════
function toggleSearch() {
  DOM.searchPanel.classList.toggle('hidden');
  if (!DOM.searchPanel.classList.contains('hidden')) {
    DOM.searchInput.value = '';
    DOM.searchInput.focus();
    renderSearchResults('');
  }
}

function renderSearchResults(query) {
  const q = query.trim().toLowerCase();
  DOM.searchResults.innerHTML = '';

  if (!q) {
    DOM.searchResults.innerHTML = '<div class="search-empty">Start typing to search</div>';
    return;
  }

  const matches = [];
  state.nodes.forEach(node => {
    if (node.content.toLowerCase().includes(q)) matches.push(node);
  });

  if (matches.length === 0) {
    DOM.searchResults.innerHTML = '<div class="search-empty">No nodes found</div>';
    return;
  }

  matches.forEach(node => {
    const preview = node.content.substring(0, 100).replace(
      new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),
      '<mark>$1</mark>'
    );
    const div = document.createElement('div');
    div.className = 'search-result';
    div.innerHTML = `
      <div class="sr-dot" style="background:${getNodeAccentColor(node.color)}"></div>
      <div class="sr-text">${preview || '<em>Empty node</em>'}</div>
    `;
    div.addEventListener('click', () => {
      panToNode(node.id, Math.max(state.camera.zoom, 0.8));
      DOM.searchPanel.classList.add('hidden');
    });
    DOM.searchResults.appendChild(div);
  });
}

function getNodeAccentColor(color) {
  const map = { default:'#7c5cfc', warm:'#f8b445', cyan:'#22d3ee', green:'#34d399', rose:'#f87171' };
  return map[color] || map.default;
}

DOM.searchInput.addEventListener('input', () => renderSearchResults(DOM.searchInput.value));
DOM.searchInput.addEventListener('keydown', e => { if (e.key === 'Escape') DOM.searchPanel.classList.add('hidden'); });

function showContextMenu(nodeId, x, y) {

  const cm = DOM.contextMenu;
  cm.classList.remove('hidden');
  // Position so it doesn't go off-screen
  const w = 180, h = 180;

function hideContextMenu() {

}

DOM.contextMenu.querySelectorAll('.cm-item').forEach(btn => {
  btn.addEventListener('click', () => {
    const action = btn.dataset.action;
    const id = state.contextTarget;
    hideContextMenu();
    if (!id) return;
    if (action === 'delete') deleteNode(id);
    else if (action === 'color') {
      const rect = btn.getBoundingClientRect();
      showColorPicker(id, rect.right + 8, rect.top);

      const node = state.nodes.get(id);
      if (node?.el) node.el.querySelector('.node-content').focus();
    }

});

function showColorPicker(nodeId, x, y) {
  state.colorTarget = nodeId;
  const cp = DOM.colorPicker;
  cp.classList.remove('hidden');
  cp.style.left = Math.min(x, window.innerWidth - 200) + 'px';
  cp.style.top  = Math.min(y, window.innerHeight - 60) + 'px';
  // Update active swatch
  const node = state.nodes.get(nodeId);
  cp.querySelectorAll('.cp-swatch').forEach(s => s.classList.toggle('active', s.dataset.color === node?.color));

DOM.colorPicker.querySelectorAll('.cp-swatch').forEach(swatch => {
  swatch.addEventListener('click', () => {
    const color = swatch.dataset.color;
    const nodeId = state.colorTarget;
    if (!nodeId) return;
    const node = state.nodes.get(nodeId);
    if (!node) return;
    node.color = color;
    node.el.dataset.color = color;
    DOM.colorPicker.querySelectorAll('.cp-swatch').forEach(s => s.classList.toggle('active', s.dataset.color === color));
    saveNodeDebounced(node);
  });
});

// ════════════════════════════════════
// 13. GRAPH VIEW (Force-Directed Network)
// ════════════════════════════════════
let graphAnimFrame = null;
const GRAPH_W = Math.min(window.innerWidth - 80, 900);
const GRAPH_H = Math.min(window.innerHeight - 120, 600);

function toggleGraphView() {
  if (DOM.graphOverlay.classList.contains('hidden')) showGraphView();
  else hideGraphView();
}

function showGraphView() {
  DOM.graphOverlay.classList.remove('hidden');
  DOM.graphCanvas.width  = GRAPH_W;
  DOM.graphCanvas.height = GRAPH_H;
  DOM.graphCanvas.style.width  = GRAPH_W  + 'px';
  DOM.graphCanvas.style.height = GRAPH_H + 'px';
  initForceSimulation();
}

function hideGraphView() {
  DOM.graphOverlay.classList.add('hidden');
  if (graphAnimFrame) { cancelAnimationFrame(graphAnimFrame); graphAnimFrame = null; }
}

function initForceSimulation() {
  const nodes = [...state.nodes.values()].map(n => ({
    id: n.id, content: n.content, color: n.color,
    x: Math.random() * (GRAPH_W - 100) + 50,
    y: Math.random() * (GRAPH_H - 100) + 50,
    vx: 0, vy: 0,
    r: clamp(14 + n.content.length * 0.12, 14, 32),
  }));
  const links = [...state.connections.values()].map(c => ({
    source: c.source_id, target: c.target_id, label: c.label,
  }));

  let hoveredId = null;
  const idxMap = new Map(nodes.map((n, i) => [n.id, i]));
  let iteration = 0;

  function tick() {
    const alpha = Math.max(0.01, 1 - iteration / 300);
    iteration++;

    // Repulsion
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[j].x - nodes[i].x;
        const dy = nodes[j].y - nodes[i].y;
        const dist = Math.sqrt(dx*dx + dy*dy) + 0.01;
        const repel = 4000 / (dist * dist);
        const fx = (dx / dist) * repel * alpha;
        const fy = (dy / dist) * repel * alpha;
        nodes[i].vx -= fx; nodes[i].vy -= fy;
        nodes[j].vx += fx; nodes[j].vy += fy;
      }
    }

    // Attraction along links
    links.forEach(link => {
      const si = idxMap.get(link.source), ti = idxMap.get(link.target);
      if (si === undefined || ti === undefined) return;
      const a = nodes[si], b = nodes[ti];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy) + 0.01;
      const target = 120;
      const force = (dist - target) * 0.03 * alpha;
      a.vx += (dx / dist) * force; a.vy += (dy / dist) * force;
      b.vx -= (dx / dist) * force; b.vy -= (dy / dist) * force;
    });

    // Centering
    const cx = nodes.reduce((s, n) => s + n.x, 0) / (nodes.length || 1);
    const cy = nodes.reduce((s, n) => s + n.y, 0) / (nodes.length || 1);
    nodes.forEach(n => {
      n.vx += (GRAPH_W/2 - cx) * 0.008 * alpha;
      n.vy += (GRAPH_H/2 - cy) * 0.008 * alpha;
      n.vx *= 0.85; n.vy *= 0.85; // damping
      n.x = clamp(n.x + n.vx, n.r, GRAPH_W - n.r);
      n.y = clamp(n.y + n.vy, n.r, GRAPH_H - n.r);
    });

    drawGraph(nodes, links, hoveredId);
    graphAnimFrame = requestAnimationFrame(tick);
  }

  graphAnimFrame = requestAnimationFrame(tick);

  // Interaction
  DOM.graphCanvas.onmousemove = e => {
    const rect = DOM.graphCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    hoveredId = null;
    for (const n of nodes) {
      const dx = n.x - mx, dy = n.y - my;
      if (Math.sqrt(dx*dx + dy*dy) < n.r + 4) { hoveredId = n.id; break; }
    }
    DOM.graphCanvas.style.cursor = hoveredId ? 'pointer' : 'default';
  };

  DOM.graphCanvas.onclick = e => {
    const rect = DOM.graphCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    for (const n of nodes) {
      const dx = n.x - mx, dy = n.y - my;
      if (Math.sqrt(dx*dx + dy*dy) < n.r + 4) {
        hideGraphView();
        setTimeout(() => panToNode(n.id, 1), 100);
        return;
      }
    }
  };
}

function drawGraph(nodes, links, hoveredId) {
  const ctx = DOM.graphCanvas.getContext('2d');
  const isDark = state.theme === 'dark';
  ctx.clearRect(0, 0, GRAPH_W, GRAPH_H);

  // Background
  ctx.fillStyle = isDark ? '#07080d' : '#f0f2fa';
  ctx.fillRect(0, 0, GRAPH_W, GRAPH_H);

  const idxMap = new Map(nodes.map((n, i) => [n.id, i]));

  // Draw links
  links.forEach(link => {
    const si = idxMap.get(link.source), ti = idxMap.get(link.target);
    if (si === undefined || ti === undefined) return;
    const a = nodes[si], b = nodes[ti];
    const isHov = (hoveredId === a.id || hoveredId === b.id);
    ctx.beginPath();
    const cpx1 = (a.x + b.x) / 2 - (b.y - a.y) * 0.1;
    const cpy1 = (a.y + b.y) / 2 + (b.x - a.x) * 0.1;
    ctx.moveTo(a.x, a.y); ctx.quadraticCurveTo(cpx1, cpy1, b.x, b.y);
    ctx.strokeStyle = isHov ? 'rgba(124,92,252,0.8)' : isDark ? 'rgba(124,92,252,0.25)' : 'rgba(100,80,200,0.2)';
    ctx.lineWidth = isHov ? 2 : 1;
    ctx.stroke();

    // Arrow
    const angle = Math.atan2(b.y - cpy1, b.x - cpx1);
    const r = b.r + 4;
    const ex = b.x - Math.cos(angle) * r, ey = b.y - Math.sin(angle) * r;
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - 7*Math.cos(angle-0.4), ey - 7*Math.sin(angle-0.4));
    ctx.lineTo(ex - 7*Math.cos(angle+0.4), ey - 7*Math.sin(angle+0.4));
    ctx.closePath();
    ctx.fillStyle = isHov ? 'rgba(124,92,252,0.9)' : isDark ? 'rgba(124,92,252,0.4)' : 'rgba(100,80,200,0.35)';
    ctx.fill();

    // Link label
    if (link.label) {
      ctx.fillStyle = isDark ? 'rgba(140,150,200,0.7)' : 'rgba(80,90,150,0.7)';
      ctx.font = '10px Syne, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(link.label, (a.x + b.x) / 2, (a.y + b.y) / 2 - 6);
    }
  });

  // Draw nodes
  nodes.forEach(n => {
    const isHov = n.id === hoveredId;
    const accent = getNodeAccentColor(n.color);

    // Glow for hovered
    if (isHov) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r + 8, 0, Math.PI*2);
      const grd = ctx.createRadialGradient(n.x, n.y, n.r, n.x, n.y, n.r + 12);
      grd.addColorStop(0, accent + '44'); grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd; ctx.fill();
    }

    // Node circle
    ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
    ctx.fillStyle = isDark ? '#13162a' : '#ffffff';
    ctx.fill();
    ctx.strokeStyle = isHov ? accent : (isDark ? 'rgba(124,92,252,0.5)' : 'rgba(100,80,200,0.3)');
    ctx.lineWidth = isHov ? 2 : 1.2;
    ctx.stroke();

    // Color dot
    ctx.beginPath(); ctx.arc(n.x, n.y - n.r * 0.35, n.r * 0.25, 0, Math.PI*2);
    ctx.fillStyle = accent;
    ctx.fill();

    // Label
    ctx.fillStyle = isDark ? (isHov ? '#e8e9f0' : '#8890b8') : (isHov ? '#1a1d35' : '#6070a0');
    ctx.font = `${isHov ? 600 : 400} ${isHov ? 10 : 9}px Syne, system-ui, sans-serif`;
    ctx.textAlign = 'center';
    const label = n.content.substring(0, 18) + (n.content.length > 18 ? '…' : '');
    ctx.fillText(label, n.x, n.y + n.r + 14);
  });
}

// ════════════════════════════════════
// 14. MINIMAP
// ════════════════════════════════════
const minimapCtx = DOM.minimapCanvas.getContext('2d');
DOM.minimapCanvas.width  = 160;
DOM.minimapCanvas.height = 110;

function updateMinimap() {
  if (state.nodes.size === 0) { DOM.minimap.style.display = 'none'; return; }
  DOM.minimap.style.display = '';
  const ctx = minimapCtx;
  const W = 160, H = 110;
  const isDark = state.theme === 'dark';

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = isDark ? '#0d0f18' : '#e8eaf6';
  ctx.fillRect(0, 0, W, H);

  // Find world bounds
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  state.nodes.forEach(n => {
    minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + n.width); maxY = Math.max(maxY, n.y + (n.height || 120));
  });
  const pad = 20;
  const ww = maxX - minX || 1, wh = maxY - minY || 1;
  const scale = Math.min((W - pad*2) / ww, (H - pad*2) / wh);
  const ox = (W - ww * scale) / 2 - minX * scale;
  const oy = (H - wh * scale) / 2 - minY * scale;

  // Draw connections
  state.connections.forEach(conn => {
    const src = state.nodes.get(conn.source_id);
    const tgt = state.nodes.get(conn.target_id);
    if (!src || !tgt) return;
    ctx.beginPath();
    ctx.moveTo(src.x * scale + ox + src.width * scale / 2, src.y * scale + oy);
    ctx.lineTo(tgt.x * scale + ox + tgt.width * scale / 2, tgt.y * scale + oy);
    ctx.strokeStyle = isDark ? 'rgba(124,92,252,0.4)' : 'rgba(100,80,200,0.3)';
    ctx.lineWidth = 0.8; ctx.stroke();
  });

  // Draw nodes
  state.nodes.forEach(n => {
    const x = n.x * scale + ox;
    const y = n.y * scale + oy;
    const w = Math.max(n.width * scale, 4);
    const h = Math.max((n.height || 120) * scale, 3);
    ctx.fillStyle = getNodeAccentColor(n.color) + (n.id === state.selectedNodeId ? 'dd' : '66');
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 2); // now polyfilled
    ctx.fill();
  });

  // Viewport indicator
  const rect = DOM.canvasContainer.getBoundingClientRect();
  const vx = (-state.camera.x / state.camera.zoom) * scale + ox;
  const vy = (-state.camera.y / state.camera.zoom) * scale + oy;
  const vw = (rect.width  / state.camera.zoom) * scale;
  const vh = (rect.height / state.camera.zoom) * scale;
  const mvp = DOM.minimapViewport;
  mvp.style.left   = Math.max(0, vx) + 'px';
  mvp.style.top    = Math.max(0, vy) + 'px';
  mvp.style.width  = Math.min(W, vw) + 'px';
  mvp.style.height = Math.min(H, vh) + 'px';
}

// Click minimap to navigate
DOM.minimap.addEventListener('click', e => {
  if (state.nodes.size === 0) return;
  const rect = DOM.minimap.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width;
  const my = (e.clientY - rect.top)  / rect.height;
  const containerRect = DOM.canvasContainer.getBoundingClientRect();

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  state.nodes.forEach(n => {
    minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + n.width); maxY = Math.max(maxY, n.y + (n.height || 120));
  });
  const pad = 20;
  const W = 160, H = 110;
  const ww = maxX - minX || 1, wh = maxY - minY || 1;
  const scale = Math.min((W - pad*2) / ww, (H - pad*2) / wh);
  const ox = (W - ww * scale) / 2 - minX * scale;
  const oy = (H - wh * scale) / 2 - minY * scale;

  const worldX = ((mx * W) - ox) / scale;
  const worldY = ((my * H) - oy) / scale;
  state.camera.x = containerRect.width  / 2 - worldX * state.camera.zoom;
  state.camera.y = containerRect.height / 2 - worldY * state.camera.zoom;
  applyTransform();
});

// ════════════════════════════════════
// 15. STATUS & UI HELPERS
// ════════════════════════════════════
function updateStatus() {
  DOM.statusNodes.textContent = state.nodes.size + (state.nodes.size === 1 ? ' node' : ' nodes');
  DOM.statusConns.textContent = state.connections.size + (state.connections.size === 1 ? ' connection' : ' connections');
}

function updateEmptyHint() {
  DOM.emptyHint.classList.toggle('hidden', state.nodes.size > 0);
}

function hideAllPopups() {
  hideContextMenu();
  DOM.colorPicker.classList.add('hidden');
  DOM.labelEditor.classList.add('hidden');
}

// Close popups on outside click
document.addEventListener('click', e => {
  if (!DOM.contextMenu.contains(e.target)) hideContextMenu();
  if (!DOM.colorPicker.contains(e.target) && !e.target.closest('[data-action="color"]')) {
    DOM.colorPicker.classList.add('hidden');
  }
  if (!DOM.labelEditor.contains(e.target)) {
    DOM.labelEditor.classList.add('hidden');
  }
});

// ════════════════════════════════════
// 16. SUPABASE API
// ════════════════════════════════════
function initSupabase() {
  if (CONFIG.SUPABASE_URL === 'YOUR_SUPABASE_URL') {
    console.info('Synaptic: Running in local mode. Configure Supabase credentials to enable sync.');
    setSyncStatus('local');
    return;
  }
  try {
    supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    state.isSupabase = true;
    setSyncStatus('synced');
    loadFromSupabase();
  } catch (err) {
    console.error('Supabase init error:', err);
    setSyncStatus('error');
  }
}

function setSyncStatus(status) {
  const badge = DOM.syncBadge;
  badge.className = 'sync-badge ' + status;
  const labels = { local: 'LOCAL', syncing: 'SYNCING', synced: 'SYNCED', error: 'ERROR' };
  badge.textContent = labels[status] || status.toUpperCase();
}

async function loadFromSupabase() {
  if (!supabaseClient) return loadFromLocal();
  try {
    setSyncStatus('syncing');
    const [{ data: nodes }, { data: connections }] = await Promise.all([
      supabaseClient.from('nodes').select('*').order('created_at'),
      supabaseClient.from('connections').select('*'),
    ]);
    if (nodes)       nodes.forEach(n => createNode(n.x, n.y, n.content, n.color, n.id, n.width));
    if (connections) connections.forEach(c => createConnection(c.source_id, c.target_id, c.label, c.id));
    setSyncStatus('synced');
    setTimeout(fitView, 100);
  } catch (err) {
    console.error('Load error:', err);
    setSyncStatus('error');
    loadFromLocal();
  }
}

async function saveNode(node) {
  persistLocal();
  if (!supabaseClient) return;
  setSyncStatus('syncing');
  try {
    await supabaseClient.from('nodes').upsert({
      id: node.id, content: node.content, x: Math.round(node.x), y: Math.round(node.y),
      width: Math.round(node.width), color: node.color,
      updated_at: new Date().toISOString(),
    });
    setSyncStatus('synced');
  } catch (e) { setSyncStatus('error'); }
}

async function saveConnection(conn) {
  persistLocal();
  if (!supabaseClient) return;
  setSyncStatus('syncing');
  try {
    await supabaseClient.from('connections').upsert({
      id: conn.id, source_id: conn.source_id, target_id: conn.target_id, label: conn.label,
    });
    setSyncStatus('synced');
  } catch (e) { setSyncStatus('error'); }
}

async function dbDeleteNode(nodeId) {
  persistLocal();
  if (!supabaseClient) return;
  await supabaseClient.from('nodes').delete().eq('id', nodeId);
}

async function dbDeleteConnection(connId) {
  persistLocal();
  if (!supabaseClient) return;
  await supabaseClient.from('connections').delete().eq('id', connId);
}

// ════════════════════════════════════
// 17. LOCAL STORAGE FALLBACK
// ════════════════════════════════════
function persistLocal() {
  try {
    const data = {
      nodes: [...state.nodes.values()].map(({ el, ...n }) => n),
      connections: [...state.connections.values()].map(({ el, ...c }) => c),
    };
    localStorage.setItem('synaptic_v1', JSON.stringify(data));
  } catch (e) { /* storage full or unavailable */ }
}

function loadFromLocal() {
  try {
    const raw = localStorage.getItem('synaptic_v1');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.nodes)       data.nodes.forEach(n => createNode(n.x, n.y, n.content, n.color, n.id, n.width));
    if (data.connections) data.connections.forEach(c => createConnection(c.source_id, c.target_id, c.label, c.id));
    if (data.nodes?.length) setTimeout(fitView, 100);
  } catch (e) { console.error('Local load error:', e); }
}

// ════════════════════════════════════
// 18. INIT
// ════════════════════════════════════
function init() {
  initToolbar();
  initCanvasInteractions();
  initSupabase();
  if (!state.isSupabase) loadFromLocal();
  applyTransform();
  updateStatus();
  updateEmptyHint();

  // Center canvas initially
  const rect = DOM.canvasContainer.getBoundingClientRect();
  state.camera.x = rect.width  / 2;
  state.camera.y = rect.height / 2;
  applyTransform();

  console.log('%cSynaptic Knowledge Board', 'font-size:18px;font-weight:bold;color:#7c5cfc;');
  console.log('%cDouble-click canvas to create nodes. Drag connectors to link them.', 'color:#8890b8');
  console.log('%cConfigure Supabase in CONFIG object for persistent sync.', 'color:#f8b445');
}

document.addEventListener('DOMContentLoaded', init);
</script>
